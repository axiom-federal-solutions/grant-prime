# ============================================================
# GRANT PRIME — Daily Agent Orchestration v2
# Noble Erne, LLC
#
# Fixed DAG:
#   Discovery → Enrich → Scoring → Strategy + Intel (parallel)
#   → Tests → Alerts + Deadlines + Health (parallel)
#   → AutoFix → Treagent
#
# Key fixes over v1:
#   - Enrich BEFORE scoring (amounts improve score quality)
#   - Strategy + Intel agents added after scoring
#   - Silent-fail detection in AutoFix
#   - All jobs Node 22 (native WebSocket)
#   - continue-on-error on non-critical jobs so pipeline doesn't halt
#
# Required GitHub Secrets:
#   SUPABASE_URL, SUPABASE_KEY, ANTHROPIC_API_KEY,
#   SENDGRID_API_KEY, SENDGRID_FROM_EMAIL, ALERT_EMAIL
# ============================================================

name: Daily Grant Agents

on:
  schedule:
    - cron: '0 12 * * *'   # 12:00 UTC = 7:00 AM CT
  workflow_dispatch:
    inputs:
      skip_discovery:
        description: 'Skip discovery agent'
        required: false
        default: 'false'
      skip_scoring:
        description: 'Skip scoring agent'
        required: false
        default: 'false'
      skip_strategy:
        description: 'Skip strategy + intel agents'
        required: false
        default: 'false'

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
  SENDGRID_FROM_EMAIL: ${{ secrets.SENDGRID_FROM_EMAIL }}
  ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}

jobs:

  # ── 1. Discovery ───────────────────────────────────────────
  discovery:
    name: "🔍 Discovery"
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_discovery != 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - name: Run discovery agent
        run: node agents/grant-discovery-agent.js
        timeout-minutes: 15

  # ── 2. Enrich (BEFORE scoring — amounts improve score quality) ─
  enrich:
    name: "💰 Enrich Amounts"
    runs-on: ubuntu-latest
    needs: discovery
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - name: Enrich grant amounts
        run: node agents/grant-amount-enricher.js
        timeout-minutes: 10
        continue-on-error: true

  # ── 3. Scoring (after enrich — richer amount data = better scores) ─
  scoring:
    name: "🧠 Scoring"
    runs-on: ubuntu-latest
    needs: enrich
    if: ${{ always() && github.event.inputs.skip_scoring != 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - name: Run scoring agent
        run: node agents/grant-scoring-agent.js
        timeout-minutes: 30

  # ── 4a. Strategy Agent (AI recommendations — after scoring) ──
  strategy:
    name: "🎯 Strategy"
    runs-on: ubuntu-latest
    needs: scoring
    if: ${{ always() && github.event.inputs.skip_strategy != 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - name: Run strategy agent
        run: node agents/grant-strategy-agent.js
        timeout-minutes: 10
        continue-on-error: true

  # ── 4b. Intel Agent (competitive intelligence — parallel) ──
  intel:
    name: "🕵️ Intel"
    runs-on: ubuntu-latest
    needs: scoring
    if: ${{ always() && github.event.inputs.skip_strategy != 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - name: Run intel agent
        run: node agents/grant-intel-agent.js
        timeout-minutes: 10
        continue-on-error: true

  # ── 5. Tests (data integrity — after strategy + intel) ───────
  tests:
    name: "🧪 Tests"
    runs-on: ubuntu-latest
    needs: [strategy, intel]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - name: Run test runner
        run: node agents/grant-test-runner.js
        timeout-minutes: 5
        continue-on-error: true

  # ── 6a. Alerts (parallel after tests) ─────────────────────
  alerts:
    name: "🚨 Alerts"
    runs-on: ubuntu-latest
    needs: tests
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - name: Run alert agent
        run: node agents/grant-alert-agent.js
        timeout-minutes: 5
        continue-on-error: true

  # ── 6b. Deadlines (parallel after tests) ─────────────────
  deadlines:
    name: "📅 Deadlines"
    runs-on: ubuntu-latest
    needs: tests
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - name: Run deadline monitor
        run: node agents/grant-deadline-monitor.js
        timeout-minutes: 5
        continue-on-error: true

  # ── 6c. Health Monitor (parallel after tests) ─────────────
  health:
    name: "🏥 Health"
    runs-on: ubuntu-latest
    needs: tests
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - name: Run health monitor
        run: node agents/grant-health-monitor.js
        timeout-minutes: 5
        continue-on-error: true

  # ── 7. AutoFix (self-healing — catches silent fails too) ──
  autofix:
    name: "🔧 AutoFix"
    runs-on: ubuntu-latest
    needs: [alerts, deadlines, health]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - name: Run autofix agent
        run: node agents/grant-autofix-agent.js
        timeout-minutes: 60
        continue-on-error: true

  # ── 8. Treagent CEO Briefing (always last) ────────────────
  treagent:
    name: "👑 Treagent"
    runs-on: ubuntu-latest
    needs: autofix
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - name: Run Treagent CEO briefing
        run: node agents/treagent.js
        timeout-minutes: 5

  # ── 9. System Monitor (25 health checks — after treagent) ──
  monitor:
    name: "🔬 System Monitor"
    runs-on: ubuntu-latest
    needs: treagent
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - name: Run system monitor (25 checks)
        run: node agents/grant-system-monitor-agent.js
        timeout-minutes: 10
        continue-on-error: true

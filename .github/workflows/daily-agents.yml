# ============================================================
# GRANT PRIME — Daily Agent Orchestration
# Noble Erne, LLC
#
# Full pipeline: Discovery → Scoring → Tests → Alerts →
#                Deadlines → Health → AutoFix → Treagent
#
# Treagent runs last — sends CEO briefing to treagent1@gmail.com
# AutoFix retries any failed agents before Treagent reports
#
# Required GitHub Secrets:
#   SUPABASE_URL           — Supabase project URL
#   SUPABASE_KEY           — Supabase anon or service key
#   ANTHROPIC_API_KEY      — Claude Haiku for scoring
#   SENDGRID_API_KEY       — email delivery
#   SENDGRID_FROM_EMAIL    — verified sender address
#   ALERT_EMAIL            — treagent1@gmail.com
# ============================================================

name: Daily Grant Agents

on:
  schedule:
    # 12:00 UTC = 7:00 AM CT
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      skip_discovery:
        description: 'Skip discovery'
        required: false
        default: 'false'
      skip_scoring:
        description: 'Skip scoring'
        required: false
        default: 'false'

# ── Shared env block ─────────────────────────────────────────
env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
  SENDGRID_FROM_EMAIL: ${{ secrets.SENDGRID_FROM_EMAIL }}
  ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}

jobs:

  # ── 1. Discovery ───────────────────────────────────────────
  discovery:
    name: "🔍 Discovery"
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_discovery != 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Run discovery agent
        run: node agents/grant-discovery-agent.js
        timeout-minutes: 15

  # ── 2. Scoring ─────────────────────────────────────────────
  scoring:
    name: "🧠 Scoring"
    runs-on: ubuntu-latest
    needs: discovery
    if: ${{ always() && github.event.inputs.skip_scoring != 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Run scoring agent
        run: node agents/grant-scoring-agent.js
        timeout-minutes: 30

  # ── 2b. Amount Enricher (parallel with scoring) ──────────
  enrich:
    name: "💰 Amounts"
    runs-on: ubuntu-latest
    needs: discovery
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Enrich grant amounts
        run: node agents/grant-amount-enricher.js
        timeout-minutes: 10
        continue-on-error: true

  # ── 3. Test Runner (data integrity validation) ────────────
  tests:
    name: "🧪 Tests"
    runs-on: ubuntu-latest
    needs: [scoring, enrich]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Run test runner
        run: node agents/grant-test-runner.js
        timeout-minutes: 5
        continue-on-error: true

  # ── 4a. Alerts (parallel after scoring) ──────────────────
  alerts:
    name: "🚨 Alerts"
    runs-on: ubuntu-latest
    needs: scoring
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Run alert agent
        run: node agents/grant-alert-agent.js
        timeout-minutes: 5

  # ── 4b. Deadlines (parallel after scoring) ────────────────
  deadlines:
    name: "📅 Deadlines"
    runs-on: ubuntu-latest
    needs: scoring
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Run deadline monitor
        run: node agents/grant-deadline-monitor.js
        timeout-minutes: 5

  # ── 5. Health Monitor ─────────────────────────────────────
  health:
    name: "🏥 Health"
    runs-on: ubuntu-latest
    needs: [tests, alerts, deadlines]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Run health monitor
        run: node agents/grant-health-monitor.js
        timeout-minutes: 5
        continue-on-error: true

  # ── 6. Auto-Fix (retries anything that failed) ────────────
  autofix:
    name: "🔧 AutoFix"
    runs-on: ubuntu-latest
    needs: health
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Run autofix agent
        run: node agents/grant-autofix-agent.js
        timeout-minutes: 60
        continue-on-error: true

  # ── 7. Treagent CEO Briefing (always runs last) ───────────
  treagent:
    name: "👑 Treagent"
    runs-on: ubuntu-latest
    needs: autofix
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Run Treagent CEO briefing
        run: node agents/treagent.js
        timeout-minutes: 5

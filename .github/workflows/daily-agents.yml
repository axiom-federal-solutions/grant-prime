# ============================================================
# GRANT PRIME — Daily Agent Orchestration
# Noble Erne, LLC
#
# Runs all agents in sequence daily at 7 AM CT (12 PM UTC).
# Treagent runs last and sends the CEO briefing to
# treagent1@gmail.com with a full status report.
#
# Required GitHub Secrets:
#   SUPABASE_URL           — from Supabase project settings
#   SUPABASE_KEY           — anon/service key
#   ANTHROPIC_API_KEY      — for scoring agent
#   SENDGRID_API_KEY       — for emails
#   SENDGRID_FROM_EMAIL    — verified sender email
#   ALERT_EMAIL            — treagent1@gmail.com
# ============================================================

name: Daily Grant Agents

on:
  schedule:
    # 12:00 UTC = 7:00 AM CT (adjusts automatically for DST)
    - cron: '0 12 * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions tab
    inputs:
      skip_discovery:
        description: 'Skip discovery agent'
        required: false
        default: 'false'
      skip_scoring:
        description: 'Skip scoring agent'
        required: false
        default: 'false'

jobs:
  # ── Job 1: Discovery ────────────────────────────────────────
  discovery:
    name: 🔍 Discovery Agent
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_discovery != 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run discovery agent
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          SENDGRID_FROM_EMAIL: ${{ secrets.SENDGRID_FROM_EMAIL }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
        run: node agents/grant-discovery-agent.js
        timeout-minutes: 15

  # ── Job 2: Scoring (needs discovery) ───────────────────────
  scoring:
    name: 🧠 Scoring Agent
    runs-on: ubuntu-latest
    needs: discovery
    if: ${{ always() && github.event.inputs.skip_scoring != 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run scoring agent
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          SENDGRID_FROM_EMAIL: ${{ secrets.SENDGRID_FROM_EMAIL }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
        run: node agents/grant-scoring-agent.js
        timeout-minutes: 30

  # ── Job 3: Alerts (needs scoring) ──────────────────────────
  alerts:
    name: 🚨 Alert Agent
    runs-on: ubuntu-latest
    needs: scoring
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run alert agent
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          SENDGRID_FROM_EMAIL: ${{ secrets.SENDGRID_FROM_EMAIL }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
        run: node agents/grant-alert-agent.js
        timeout-minutes: 5

  # ── Job 4: Deadlines (parallel with alerts) ────────────────
  deadlines:
    name: 📅 Deadline Monitor
    runs-on: ubuntu-latest
    needs: scoring
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run deadline monitor
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          SENDGRID_FROM_EMAIL: ${{ secrets.SENDGRID_FROM_EMAIL }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
        run: node agents/grant-deadline-monitor.js
        timeout-minutes: 5

  # ── Job 5: Health Check (after scoring) ────────────────────
  health:
    name: 🏥 Health Monitor
    runs-on: ubuntu-latest
    needs: scoring
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run health monitor
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          SENDGRID_FROM_EMAIL: ${{ secrets.SENDGRID_FROM_EMAIL }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
        run: node agents/grant-health-monitor.js
        timeout-minutes: 5
        # Don't fail the whole workflow if health check finds issues
        # Treagent will report the issues in its briefing
        continue-on-error: true

  # ── Job 6: TREAGENT CEO Briefing (runs last) ───────────────
  treagent:
    name: 👑 Treagent CEO Briefing
    runs-on: ubuntu-latest
    needs: [alerts, deadlines, health]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run Treagent CEO briefing
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          SENDGRID_FROM_EMAIL: ${{ secrets.SENDGRID_FROM_EMAIL }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
        run: node agents/treagent.js
        timeout-minutes: 5

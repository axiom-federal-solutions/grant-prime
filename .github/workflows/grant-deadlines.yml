name: Grant Deadline Monitor

on:
  schedule:
    - cron: '0 13 * * *'  # 8:00 AM CT daily
  workflow_dispatch:

jobs:
  deadlines:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run deadline monitor
        run: node agents/grant-deadline-monitor.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          SENDGRID_FROM_EMAIL: ${{ secrets.SENDGRID_FROM_EMAIL }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}

      - name: Notify on failure
        if: failure()
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          SENDGRID_FROM_EMAIL: ${{ secrets.SENDGRID_FROM_EMAIL }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
        run: |
          curl -s --request POST --url 'https://api.sendgrid.com/v3/mail/send' \
            --header "Authorization: Bearer $SENDGRID_API_KEY" \
            --header 'Content-Type: application/json' \
            --data "{
              \"personalizations\":[{\"to\":[{\"email\":\"$ALERT_EMAIL\"}]}],
              \"from\":{\"email\":\"$SENDGRID_FROM_EMAIL\"},
              \"subject\":\"⚠️ GRANT PRIME: Deadline Monitor FAILED\",
              \"content\":[{\"type\":\"text/plain\",\"value\":\"Deadline monitor agent failed — deadline close emails were NOT sent.\\nRun: ${{ github.run_id }}\\nLogs: https://github.com/axiom-federal-solutions/grant-prime/actions/runs/${{ github.run_id }}\"}]
            }"

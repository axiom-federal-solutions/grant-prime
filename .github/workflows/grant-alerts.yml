name: Grant Alerts

on:
  schedule:
    - cron: '30 12 * * *'  # 7:30 AM CT daily
  workflow_dispatch:

jobs:
  alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run alert agent
        run: node agents/grant-alert-agent.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          SENDGRID_FROM_EMAIL: ${{ secrets.SENDGRID_FROM_EMAIL }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}

      - name: Notify on failure
        if: failure()
        run: |
          echo "Alert agent failed on run ${{ github.run_id }}"
          echo "Check logs: https://github.com/axiom-federal-solutions/grant-prime/actions/runs/${{ github.run_id }}"

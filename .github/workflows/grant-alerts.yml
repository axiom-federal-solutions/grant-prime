name: Grant Alerts

on:
  schedule:
    - cron: '30 12 * * *'  # 7:30 AM CT daily
  workflow_dispatch:

jobs:
  alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm ci

      - name: Run alert agent
        run: node agents/grant-alert-agent.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          SENDGRID_FROM_EMAIL: ${{ secrets.SENDGRID_FROM_EMAIL }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}

      - name: Send failure alert email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.sendgrid.net
          server_port: 587
          username: apikey
          password: ${{ secrets.SENDGRID_API_KEY }}
          to: ${{ secrets.ALERT_EMAIL }}
          from: ${{ secrets.SENDGRID_FROM_EMAIL }}
          subject: "🚨 GRANT PRIME: Alert Agent FAILED — ${{ github.run_id }}"
          body: |
            The Grant Alert agent failed on ${{ github.run_id }}.
            Check the logs: https://github.com/axiom-federal-solutions/grant-prime/actions/runs/${{ github.run_id }}

name: Grant Discovery

on:
  schedule:
    - cron: '0 11 * * *'   # 6:00 AM CT daily
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run discovery agent
        run: node agents/grant-discovery-agent.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Run scoring agent
        run: node agents/grant-scoring-agent.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Notify on failure
        if: failure()
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          SENDGRID_FROM_EMAIL: ${{ secrets.SENDGRID_FROM_EMAIL }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
        run: |
          curl -s --request POST --url 'https://api.sendgrid.com/v3/mail/send' \
            --header "Authorization: Bearer $SENDGRID_API_KEY" \
            --header 'Content-Type: application/json' \
            --data "{
              \"personalizations\":[{\"to\":[{\"email\":\"$ALERT_EMAIL\"}]}],
              \"from\":{\"email\":\"$SENDGRID_FROM_EMAIL\"},
              \"subject\":\"⚠️ GRANT PRIME: Discovery/Scoring agent FAILED\",
              \"content\":[{\"type\":\"text/plain\",\"value\":\"Discovery or Scoring agent failed.\\nRun: ${{ github.run_id }}\\nLogs: https://github.com/axiom-federal-solutions/grant-prime/actions/runs/${{ github.run_id }}\"}]
            }"

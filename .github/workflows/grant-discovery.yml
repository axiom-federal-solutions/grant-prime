name: Grant Discovery

on:
  schedule:
    - cron: '0 11 * * *'  # 6:00 AM CT (UTC-5) every day
  workflow_dispatch:       # allows manual trigger from GitHub Actions UI

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Node.js 18
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run discovery agent
        run: node agents/grant-discovery-agent.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GRANTS_GOV_API_KEY: ${{ secrets.GRANTS_GOV_API_KEY }}
          SAM_GOV_API_KEY: ${{ secrets.SAM_GOV_API_KEY }}

      - name: Run scoring agent immediately after discovery
        run: node agents/grant-scoring-agent.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

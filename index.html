body{font-family:'Outfit',system-ui,sans-serif;background:var(--bg);color:var(--t1);height:100vh;overflow:hidden;display:flex}

<style>
.pin-key{width:72px;height:72px;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:rgba(15,20,36,.9);color:#EDF0F7;font-family:'Outfit',sans-serif;font-size:22px;font-weight:600;cursor:pointer;transition:all .12s;display:flex;align-items:center;justify-content:center}

<script>
const PIN_CORRECT='8888';
let pinEntry='';
function pinUpdateDots(){document.querySelectorAll('.pin-dot').forEach((d,i)=>{const f=i<pinEntry.length;d.style.background=f?'#34D399':'transparent';d.style.borderColor=f?'#34D399':'#2A3448';d.style.boxShadow=f?'0 0 6px rgba(52,211,153,.5)':'none'});}
function pinPress(d){if(pinEntry.length>=4)return;pinEntry+=d;pinUpdateDots();if(pinEntry.length===4)pinCheck();}
function pinBack(){pinEntry=pinEntry.slice(0,-1);pinUpdateDots();document.getElementById('pin-error').style.opacity='0';}
function pinClear(){pinEntry='';pinUpdateDots();document.getElementById('pin-error').style.opacity='0';}
function pinCheck(){
  if(pinEntry===PIN_CORRECT){
    sessionStorage.setItem('gp_auth','1');
    const s=document.getElementById('pin-screen');
    s.style.transition='opacity .4s ease';s.style.opacity='0';
    setTimeout(()=>{s.style.display='none';},400);
    loadData();setInterval(()=>loadData(),300000);
  } else {
    const err=document.getElementById('pin-error');
    err.textContent='Incorrect code — try again';err.style.opacity='1';
    const pad=document.getElementById('pin-dots');pad.style.transition='transform .07s';
    let sh=0;const shake=setInterval(()=>{pad.style.transform=sh%2===0?'translateX(8px)':'translateX(-8px)';if(++sh>5){clearInterval(shake);pad.style.transform='translateX(0)';}},70);
    setTimeout(()=>{pinEntry='';pinUpdateDots();},600);
  }
}
document.addEventListener('keydown',e=>{
  if(document.getElementById('pin-screen').style.display==='none')return;
  if(e.key>='0'&&e.key<='9')pinPress(e.key);
  else if(e.key==='Backspace')pinBack();
  else if(e.key==='Escape')pinClear();
});
if(sessionStorage.getItem('gp_auth')==='1'){document.getElementById('pin-screen').style.display='none';}
</script>

function fmt(v){if(!v&&v!==0)return '—';return v>=1e9?'$'+(v/1e9).toFixed(2)+'B':v>=1e6?'$'+(v/1e6).toFixed(1)+'M':v>=1000?'$'+(v/1000).toFixed(0)+'K':'$'+Math.round(v);}

function fmtDate(d){if(!d)return '—';return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function srcColor(s){return {federal:'var(--cyan)',edtech:'var(--green)',state:'var(--gold)',foundation:'var(--violet)'}[s]||'var(--t2)';}

// ── NAICS / KEYWORD MATCHERS ─────────────────────────────────────────────────
// Ed/Tech: Noble Erne NAICS + training/IT/consulting keywords
const EDTECH_NAICS=['541511','541512','541519','541611','541618','611430','611420','611699','611710'];
const EDTECH_KW=/workforce|instructional design|SAP|ERP|IT training|software training|elearning|edtech|technology training|employee training|consulting|capacity building|software implementation|lms|curriculum|professional development/i;

// STEM: science, technology, engineering, math R&D + education NAICS
const STEM_NAICS=['541715','541720','611310','611210','611110','611519','611411','334111','334413','519130'];
const STEM_KW=/\bSTEM\b|science|engineering|mathematics|math|research and development|\bR&D\b|innovation|laboratory|computer science|data science|coding|robotics|biotech|biotechnology|nanotechnology|aerospace|physics|chemistry|biology|artificial intelligence|\bAI\b|machine learning|cybersecurity|quantum|NSF|NIH|DARPA/i;

// Construction: Walker NAICS + construction/facilities keywords
const CONSTRUCTION_NAICS=['236220','238210','237990','236116','561730','424710','424130','424490','424120','424410'];
const CONSTRUCTION_KW=/construction|renovation|facilities|infrastructure|building|contractor|electrical|landscaping|civil engineering|HUBZone|veteran set-aside|SDVOSB|VOSB|veteran contractor|veteran owned|service-disabled|VA construction|DOD facilities|supply chain|janitorial/i;

function grantMatchesEdTech(g){
  const ef=(g.entity_fit||'').toLowerCase();
  const src=(g.source||'');
  const text=((g.title||'')+' '+(g.description||'')+' '+(g.eligibility||'')).toLowerCase();
  if(ef.includes('noble erne')||ef==='both') return true;
  if(src==='edtech') return true;
  if(EDTECH_NAICS.some(n=>g.naics&&g.naics.startsWith(n))) return true;
  if(EDTECH_KW.test(g.title+' '+g.description)) return true;
  return false;
}
function grantMatchesSTEM(g){
  const text=(g.title||'')+' '+(g.description||'');
  if(STEM_NAICS.some(n=>g.naics&&g.naics.startsWith(n))) return true;
  if(STEM_KW.test(text)) return true;
  return false;
}
function grantMatchesConstruction(g){
  const ef=(g.entity_fit||'').toLowerCase();
  const text=(g.title||'')+' '+(g.description||'');
  if(ef.includes('walker')||ef.includes('sdvosb')) return true;
  if(CONSTRUCTION_NAICS.some(n=>g.naics&&g.naics.startsWith(n))) return true;
  if(CONSTRUCTION_KW.test(text)) return true;
  return false;
}

// Fuzzy-match across all grants — same logic as IQE Prime filter-system.js
// but self-contained with no external dependency.
let _searchActive = false;
function runGrantSearch() {
  const inp = document.getElementById('gp-search-input');
  const out = document.getElementById('gp-search-results');
  if (!inp || !out) return;
  const q = inp.value.trim().toLowerCase();
  if (q.length < 2) { out.innerHTML = ''; out.style.display = 'none'; _searchActive = false; return; }
  _searchActive = true;

  const tokens = q.split(/\s+/).filter(Boolean);
  const scored = [];

  for (const g of GRANTS) {
    const haystack = [g.title||'', g.funder||'', g.description||'', g.eligibility||'', g.naics||'', g.source||'', g.category||'', g.entity_fit||'', g.notes||''].join(' ').toLowerCase();
    let score = 0;
    let allMatch = true;
    for (const tok of tokens) {
      if (haystack.includes(tok)) score += 10;
      else { allMatch = false; }
    }
    if (!allMatch) continue;
    const titleLo = (g.title||'').toLowerCase();
    for (const tok of tokens) if (titleLo.includes(tok)) score += 8;
    if ((g.naics||'').toLowerCase().startsWith(q)) score += 25;
    if ((g.funder||'').toLowerCase().includes(q)) score += 12;
    scored.push({ g, score });
  }

  scored.sort((a, b) => b.score - a.score);
  const results = scored.slice(0, 30);

  if (!results.length) {
    out.style.display = 'block';
    out.innerHTML = `<div style="padding:14px 16px;font-size:12px;color:var(--t3)">No matches for "${q}" — try a funder name, NAICS code, or keyword</div>`;
    return;
  }

  out.style.display = 'block';
  out.innerHTML = `<div style="padding:8px 16px 4px;font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;font-weight:700">${results.length} result${results.length>1?'s':''}</div>` +
    results.map(({g}) => `
      <div onclick="openGrantDetail('${g.grant_id}')" style="padding:10px 16px;border-top:1px solid var(--bd);cursor:pointer;display:grid;grid-template-columns:1fr 52px 80px;gap:8px;align-items:center;transition:background .15s" onmouseover="this.style.background='var(--bg3)'" onmouseout="this.style.background=''">
        <div>
          <div style="font-size:12px;font-weight:600;color:var(--t1);margin-bottom:2px">${(g.title||'Untitled').slice(0,62)}${(g.title||'').length>62?'…':''}</div>
          <div style="font-size:10px;color:var(--t3)">${g.funder||'—'} · <span style="color:${srcColor(g.source)}">${srcLabel(g.source)}</span>${g.naics?` · NAICS ${g.naics}`:''}</div>
        </div>
        <div style="font-size:15px;font-weight:800;color:${sc(g.score||0)};text-align:center">${g.score||'—'}</div>
        <div style="text-align:right;font-size:11px;color:var(--t2)">${fmtDate(g.deadline)}</div>
      </div>`).join('');
}
function clearGrantSearch() {
  const inp = document.getElementById('gp-search-input');
  const out = document.getElementById('gp-search-results');
  if (inp) inp.value = '';
  if (out) { out.innerHTML = ''; out.style.display = 'none'; }
  _searchActive = false;
}

// ── DAILY BRIEFING — load from system_log ─────────────────────────────────
let _briefing = null;
async function loadBriefing() {
  if (!sb) return;
  try {
    const today = new Date(); today.setHours(0,0,0,0);
    const [discRes, scoreRes, healthRes] = await Promise.all([
      sb.from('system_log').select('*').eq('agent','grant-discovery-agent').gte('run_at', today.toISOString()).order('run_at',{ascending:false}).limit(1),
      sb.from('system_log').select('*').eq('agent','grant-scoring-agent').gte('run_at', today.toISOString()).order('run_at',{ascending:false}).limit(1),
      sb.from('system_log').select('*').eq('agent','grant-health-monitor').gte('run_at', today.toISOString()).order('run_at',{ascending:false}).limit(1),
    ]);
    _briefing = {
      discovery: discRes.data?.[0] || null,
      scoring:   scoreRes.data?.[0] || null,
      health:    healthRes.data?.[0] || null,
    };
  } catch(e) { _briefing = null; }
}

// ── ACTION QUEUE ──────────────────────────────────────────────────────────
let _aqBudget = 0; // 0 = no filter, else minimum amount_max
function setAQBudget(v){
  _aqBudget = _aqBudget === v ? 0 : v;
  renderAction();
}
function renderAction(){
  const el=document.getElementById('t-action');
  let urgent=GRANTS.filter(g=>{const d=daysLeft(g.deadline);return d!==null&&d<=14&&g.score>=65&&g.status!=='closed'&&g.status!=='won'&&g.status!=='applied';});
  if (_aqBudget > 0) urgent = urgent.filter(g => (g.amount_max||0) >= _aqBudget || g.amount_max === null);
  urgent = urgent.sort((a,b)=>daysLeft(a.deadline)-daysLeft(b.deadline));

  const budgetBtns = [
    {label:'All Amounts', v:0},
    {label:'$10K+', v:10000},
    {label:'$50K+', v:50000},
    {label:'$100K+', v:100000},
    {label:'$250K+', v:250000},
  ].map(b=>`<button onclick="setAQBudget(${b.v})" style="padding:4px 10px;border-radius:5px;border:1px solid ${_aqBudget===b.v?'var(--greenBd)':'var(--bd)'};background:${_aqBudget===b.v?'var(--greenDim)':'var(--bg3)'};color:${_aqBudget===b.v?'var(--green)':'var(--t2)'};font-family:'Outfit',sans-serif;font-size:10px;font-weight:600;cursor:pointer">${b.label}</button>`).join('');

  el.innerHTML=`
    <div style="margin-bottom:12px"><div style="font-size:20px;font-weight:800">🚨 Action Queue</div><div style="font-size:11px;color:var(--t3);margin-top:2px">High-match grants · deadline ≤14 days · score ≥65 · not yet applied</div></div>
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:14px;flex-wrap:wrap">
      <span style="font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;font-weight:700;margin-right:2px">Award:</span>
      ${budgetBtns}
    </div>
    ${urgent.length?`<div style="display:grid;grid-template-columns:minmax(0,1fr) 70px 90px 80px 70px;gap:8px;padding:6px 14px;margin-bottom:4px"><span style="font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.1em">Grant</span><span style="font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.1em">Score</span><span style="font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.1em">Amount</span><span style="font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.1em">Deadline</span><span style="font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.1em">Days</span></div>${urgent.map(g=>{const d=daysLeft(g.deadline);return `<div class="grant-row ${urgencyClass(g.deadline)}" onclick="openGrantDetail('${g.grant_id}')"><div><div style="font-size:12px;font-weight:600">${(g.title||'Untitled').slice(0,56)}…</div><div style="font-size:10px;color:var(--t3);margin-top:2px">${g.funder||'—'} · <span style="color:${srcColor(g.source)}">${srcLabel(g.source)}</span></div></div><div style="font-size:16px;font-weight:800;color:${sc(g.score)}">${g.score}</div><div style="font-size:12px;font-weight:600">${fmt(g.amount_max)}</div><div style="font-size:11px">${fmtDate(g.deadline)}</div><div style="font-size:14px;font-weight:800;color:${d<=7?'var(--red)':'var(--amber)'}">${d}d</div></div>`;}).join('')}`:'<div class="empty"><div class="empty-icon">✅</div><div class="empty-title">Action queue clear</div><div class="empty-body">No high-match grants closing in the next 14 days${_aqBudget>0?' at this award size':''}.${_aqBudget>0?' <button onclick="setAQBudget(0)" style="background:none;border:none;color:var(--green);cursor:pointer;font-family:inherit;font-size:11px;text-decoration:underline">Clear budget filter</button>':''}</div></div>'}`;
}

// ── DEADLINE TRACKER ──────────────────────────────────────────────────────
function renderDeadlines(){
  const el=document.getElementById('t-deadlines');
  const active=GRANTS.filter(g=>g.deadline&&g.status!=='closed'&&g.status!=='won').sort((a,b)=>new Date(a.deadline)-new Date(b.deadline));
  const groups={7:[],14:[],30:[],60:[],later:[]};
  active.forEach(g=>{const d=daysLeft(g.deadline);if(d<=0)return;if(d<=7)groups[7].push(g);else if(d<=14)groups[14].push(g);else if(d<=30)groups[30].push(g);else if(d<=60)groups[60].push(g);else groups.later.push(g);});
  const section=(title,color,list)=>list.length?`<div style="margin-bottom:18px"><div style="font-size:11px;font-weight:700;color:${color};text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px">${title} (${list.length})</div>${list.map(g=>`<div class="grant-row ${urgencyClass(g.deadline)}" onclick="openGrantDetail('${g.grant_id}')"><div><div style="font-size:12px;font-weight:600">${(g.title||'Untitled').slice(0,56)}…</div><div style="font-size:10px;color:var(--t3);margin-top:2px">${g.funder||'—'}</div></div><div style="font-size:16px;font-weight:800;color:${sc(g.score||0)}">${g.score||'—'}</div><div style="font-size:12px">${fmt(g.amount_max)}</div><div style="font-size:11px;font-weight:600;color:${color}">${fmtDate(g.deadline)}</div><div style="font-size:13px;font-weight:800;color:${color}">${daysLeft(g.deadline)}d</div></div>`).join('')}</div>`:'';
  el.innerHTML=`<div style="margin-bottom:18px"><div style="font-size:20px;font-weight:800">⏰ Deadline Tracker</div><div style="font-size:11px;color:var(--t3);margin-top:2px">${active.length} active grants with upcoming deadlines</div></div>${section('🔴 Closing in ≤7 days','var(--red)',groups[7])}${section('🟡 Closing in 8–14 days','var(--amber)',groups[14])}${section('🟢 Closing in 15–30 days','var(--green)',groups[30])}${section('⬜ Closing in 31–60 days','var(--t2)',groups[60])}${section('📅 Closing later','var(--t3)',groups.later)}${!active.length?'<div class="empty"><div class="empty-icon">⏰</div><div class="empty-title">No active deadlines</div><div class="empty-body">Run discovery to populate grants with deadlines.</div></div>':''}`;
}

// ── PERFORMANCE ───────────────────────────────────────────────────────────

// ── STATUS CHANGE ─────────────────────────────────────────────────────────
async function changeStatus(grantId, newStatus){
  const btn=document.getElementById('status-saving');
  if(btn)btn.textContent='Saving…';
  const {error}=await sb.from('grants').update({status:newStatus}).eq('id',grantId);
  if(error){alert('Save failed: '+error.message);return;}
  const g=GRANTS.find(gr=>gr.id===grantId);
  if(g){g.status=newStatus;}
  await loadData();
  openGrantDetail(grantId);
}

// ── SAVE NOTES ────────────────────────────────────────────────────────────
async function saveNotes(grantId){
  const val=document.getElementById('notes-input-'+grantId)?.value||'';
  const {error}=await sb.from('grants').update({notes:val}).eq('id',grantId);
  if(error){alert('Save failed: '+error.message);return;}
  const g=GRANTS.find(gr=>gr.id===grantId);
  if(g)g.notes=val;
  const btn=document.getElementById('notes-save-'+grantId);
  if(btn){btn.textContent='Saved ✓';btn.style.color='var(--green)';setTimeout(()=>{btn.textContent='Save Notes';btn.style.color='';},2000);}
}

// ── SAVE ASSIGNMENT ───────────────────────────────────────────────────────
async function saveAssignment(grantId){
  const val=document.getElementById('assign-input-'+grantId)?.value||'';
  const match=document.getElementById('match-input-'+grantId)?.value||null;
  const contact=document.getElementById('contact-input-'+grantId)?.value||'';
  const {error}=await sb.from('grants').update({
    assigned_to:val||null,
    match_required:match?Number(match):null,
    funder_contact:contact||null,
  }).eq('id',grantId);
  if(error){alert('Save failed: '+error.message);return;}
  const g=GRANTS.find(gr=>gr.id===grantId);
  if(g){g.assigned_to=val;g.match_required=match;g.funder_contact=contact;}
  const btn=document.getElementById('assign-save-'+grantId);
  if(btn){btn.textContent='Saved ✓';btn.style.color='var(--green)';setTimeout(()=>{btn.textContent='Save';btn.style.color='';},2000);}
}

// ── LOAD DATA ─────────────────────────────────────────────────────────────
async function loadData(){
  if(loading)return;loading=true;
  try{
    const {data,error}=await sb.from('grants').select('*').order('score',{ascending:false}).limit(500);
    if(error)throw error;
    GRANTS=data||[];
    await loadBriefing();
    document.getElementById('last-load').textContent='Updated '+new Date().toLocaleTimeString();
    const urgent=GRANTS.filter(g=>{const d=daysLeft(g.deadline);return d!==null&&d<=14&&g.score>=65&&g.status!=='closed'&&g.status!=='won'&&g.status!=='applied';}).length;
    const btn=document.getElementById('sb-action');
    if(btn)btn.innerHTML=`🚨 Action Queue${urgent?` <span style="margin-left:auto;background:var(--red);color:#fff;font-size:8px;font-weight:800;padding:1px 5px;border-radius:3px">${urgent}</span>`:''}`;
    const activeTab=document.querySelector('.tab.active');
    if(activeTab)render(activeTab.id.replace('t-',''));
  }catch(err){
    console.error('Load error:',err);
    document.getElementById('last-load').textContent='Load failed — check Supabase URL';
  }finally{loading=false;}
}

      <div style="display:flex;gap:8px"><button onclick="saveNewContact()" style="padding:6px 16px;border-radius:5px;border:1px solid var(--greenBd);background:var(--greenDim);color:var(--green);font-family:'Outfit',sans-serif;font-size:11px;font-weight:700;cursor:pointer">Save Contact</button><button onclick="document.getElementById('add-contact-form').style.display='none'" style="padding:6px 14px;border-radius:5px;border:1px solid var(--bd);background:transparent;color:var(--t2);font-family:'Outfit',sans-serif;font-size:11px;cursor:pointer">Cancel</button></div>
    </div>
    ${contacts.length?contacts.map(c=>`
      <div class="card-section" style="margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;align-items:start">
          <div><div style="font-size:13px;font-weight:700;color:var(--t1);margin-bottom:3px">${c.funder_name}</div><div style="font-size:11px;color:var(--green);margin-bottom:4px">${c.contact_name||'No contact name'}</div><div style="display:flex;gap:12px;font-size:10px;color:var(--t2)">${c.contact_email?`<span>✉ ${c.contact_email}</span>`:''}${c.contact_phone?`<span>📞 ${c.contact_phone}</span>`:''}</div></div>
          <div style="font-size:9px;color:var(--t3);text-align:right">${c.last_contact?'Last contact: '+fmtDate(c.last_contact):'No contact logged'}</div>
        </div>
        ${c.relationship_notes?`<div style="margin-top:8px;font-size:11px;color:var(--t2);line-height:1.6;padding-top:8px;border-top:1px solid var(--bd)">${c.relationship_notes}</div>`:''}
      </div>`).join(''):`<div class="empty"><div class="empty-icon">🤝</div><div class="empty-title">No funder contacts yet</div><div class="empty-body">Add contacts from program officers, foundation reps, and agency staff you've connected with.</div></div>`}`;
}

function openAddContact(){
  document.getElementById('add-contact-form').style.display='block';
  document.getElementById('nc-funder').focus();
}

async function saveNewContact(){
  const funder=document.getElementById('nc-funder').value.trim();
  if(!funder){alert('Funder name is required');return;}
  const {error}=await sb.from('funder_contacts').insert({
    funder_name:funder,
    contact_name:document.getElementById('nc-name').value.trim()||null,
    contact_email:document.getElementById('nc-email').value.trim()||null,
    contact_phone:document.getElementById('nc-phone').value.trim()||null,
    relationship_notes:document.getElementById('nc-notes').value.trim()||null,
    last_contact:new Date().toISOString().split('T')[0],
  });
  if(error){alert('Save failed: '+error.message);return;}
  renderFunders();
}

// ── CSV EXPORT ────────────────────────────────────────────────────────────
function exportCSV(){
  if(!GRANTS.length){alert('No grants loaded to export.');return;}
  const headers=['Title','Funder','Source','Score','Status','Amount Max','Deadline','Assigned To','Apply URL'];
  const rows=GRANTS.map(g=>[
    `"${(g.title||'').replace(/"/g,'""')}"`,
    `"${(g.funder||'').replace(/"/g,'""')}"`,
    g.source||'',
    g.score||0,
    g.status||'new',
    g.amount_max||'',
    g.deadline||'',
    `"${(g.assigned_to||'').replace(/"/g,'""')}"`,
    `"${(g.apply_url||'').replace(/"/g,'""')}"`,
  ].join(','));
  const csv=[headers.join(','),...rows].join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`grant-prime-export-${new Date().toISOString().split('T')[0]}.csv`;
  a.click();URL.revokeObjectURL(url);
}

renderHome();
if(sessionStorage.getItem('gp_auth')==='1'){loadData();setInterval(()=>loadData(),300000);}

// Close search dropdown when clicking outside
document.addEventListener('click', e => {
  const wrap = document.getElementById('gp-search-wrap');
  const out  = document.getElementById('gp-search-results');
  if (out && wrap && !wrap.contains(e.target)) {
    out.innerHTML = ''; out.style.display = 'none'; _searchActive = false;
  }
});
</script>

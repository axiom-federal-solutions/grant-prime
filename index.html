*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06080F;--panel:#0B0F1A;--card:#0F1424;--cardHi:#131B30;
  --bd:rgba(255,255,255,.06);--t1:#EDF0F7;--t2:#8B95AB;--t3:#4D5669;
  --gold:#E9C46A;--goldDim:rgba(233,196,106,.12);--goldBd:rgba(233,196,106,.25);
  --cyan:#00E5FF;--cyanDim:rgba(0,229,255,.10);--cyanBd:rgba(0,229,255,.25);
  --green:#34D399;--greenDim:rgba(52,211,153,.10);--greenBd:rgba(52,211,153,.25);
  --red:#F87171;--redDim:rgba(248,113,113,.10);
  --amber:#F59E0B;--amberDim:rgba(245,158,11,.10);
  --violet:#A78BFA;--violetDim:rgba(167,139,250,.10);--violetBd:rgba(167,139,250,.25);
  --rose:#FB7185;--roseDim:rgba(251,113,133,.10);
  --steel:#64748B
}
body{font-family:'Outfit',system-ui,sans-serif;background:var(--bg);color:var(--t1);height:100vh;overflow:hidden;display:flex}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:99px}
.ambient{position:fixed;inset:0;pointer-events:none;background:radial-gradient(900px 500px at 70% -10%,var(--greenDim),transparent 60%),radial-gradient(700px 400px at 10% 110%,var(--goldDim),transparent 60%);z-index:0}

/* ── SIDEBAR ── */
.sb{width:224px;background:rgba(8,11,20,.85);backdrop-filter:blur(12px);border-right:1px solid var(--bd);padding:16px 10px;display:flex;flex-direction:column;gap:2px;overflow-y:auto;flex-shrink:0;z-index:1}
.sb-logo{padding:8px 12px 20px;display:flex;align-items:center;gap:10px}
.sb-mark{width:42px;height:42px;border-radius:8px;background:linear-gradient(135deg,#34D399,#059669);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:#fff;flex-shrink:0;box-shadow:0 0 18px rgba(52,211,153,.3)}
.sb-title{font-weight:800;font-size:15px}.sb-title span{color:var(--green)}
.sb-ver{font-size:8px;color:var(--t3);letter-spacing:.14em;text-transform:uppercase;margin-top:1px}
.sb-group{font-size:9px;font-weight:700;color:var(--t3);letter-spacing:.16em;padding:12px 12px 4px;text-transform:uppercase}
.sb-btn{display:flex;align-items:center;gap:10px;width:100%;padding:8px 12px;border:none;border-radius:6px;cursor:pointer;background:transparent;color:var(--t2);font-size:12px;font-family:'Outfit',sans-serif;font-weight:400;text-align:left;transition:all .15s}

.sb-dot{width:6px;height:6px;border-radius:99px;margin-left:auto}
.sb-foot{margin-top:auto;padding:16px 12px 8px;font-size:9px;color:var(--t3);line-height:1.6;border-top:1px solid var(--bd)}

/* ── MAIN ── */
.main{flex:1;overflow-y:auto;padding:20px 24px 40px;z-index:1}
.tab{display:none}.tab.active{display:block}

/* ── COMPONENTS ── */
.badge{font-size:9px;font-weight:700;letter-spacing:.08em;padding:2px 7px;border-radius:4px;text-transform:uppercase;white-space:nowrap;display:inline-block}
.kpi-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.kpi{background:var(--card);border:1px solid var(--bd);border-radius:8px;padding:12px 14px;flex:1;min-width:120px}
.kpi-val{font-size:22px;font-weight:800}.kpi-lbl{font-size:10px;color:var(--t2);margin-top:2px}.kpi-sub{font-size:9px;color:var(--t3);margin-top:3px}
.grant-row{display:grid;grid-template-columns:minmax(0,1fr) 80px 90px 80px 70px;gap:8px;align-items:center;padding:10px 14px;background:var(--card);border:1px solid var(--bd);border-radius:8px;transition:border-color .15s;cursor:pointer;margin-bottom:6px}

.feed{background:var(--card);border:1px solid var(--bd);border-radius:8px;padding:14px;max-height:440px;overflow-y:auto}
.feed-item{display:flex;gap:8px;padding:8px 0;border-bottom:1px solid var(--bd)}.feed-item:last-child{border-bottom:none}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.card-section{background:var(--card);border:1px solid var(--bd);border-radius:8px;padding:16px;margin-bottom:14px}
.card-title{font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px}
.bar{height:4px;background:var(--bd);border-radius:99px;overflow:hidden;margin-top:6px}.bar-fill{height:100%;border-radius:99px}

.refresh-btn{padding:6px 12px;border-radius:6px;border:1px solid var(--greenBd);background:transparent;color:var(--green);font-family:'Outfit',sans-serif;font-size:10px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
.refresh-btn:hover{background:var(--greenDim)}
.apply-btn{width:100%;padding:12px;border-radius:8px;border:2px solid var(--green);background:var(--greenDim);color:var(--green);font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;cursor:pointer;text-align:center;letter-spacing:.04em;transition:all .15s}

.loading-row{background:var(--card);border-radius:8px;padding:14px;margin-bottom:6px;animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.35}50%{opacity:.65}}
@keyframes spin{to{transform:rotate(360deg)}}
.spinning{animation:spin .8s linear infinite;display:inline-block}

/* Status pills */
.sp-new{font-size:8px;font-weight:700;padding:1px 6px;border-radius:3px;background:var(--cyanDim);color:var(--cyan);text-transform:uppercase;letter-spacing:.08em}
.sp-scored{font-size:8px;font-weight:700;padding:1px 6px;border-radius:3px;background:var(--goldDim);color:var(--gold);text-transform:uppercase;letter-spacing:.08em}
.sp-applied{font-size:8px;font-weight:700;padding:1px 6px;border-radius:3px;background:var(--greenDim);color:var(--green);text-transform:uppercase;letter-spacing:.08em}
.sp-won{font-size:8px;font-weight:700;padding:1px 6px;border-radius:3px;background:var(--violetDim);color:var(--violet);text-transform:uppercase;letter-spacing:.08em}
.sp-closed{font-size:8px;font-weight:700;padding:1px 6px;border-radius:3px;background:var(--bd);color:var(--t3);text-transform:uppercase;letter-spacing:.08em}

/* Detail panel */
.det-ov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;display:none;backdrop-filter:blur(2px)}
.det-ov.open{display:block}
.det-pan{position:fixed;right:0;top:0;height:100vh;width:520px;max-width:94vw;background:var(--panel);border-left:1px solid var(--greenBd);z-index:101;overflow-y:auto;padding:28px 24px;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1)}
.det-pan.open{transform:translateX(0)}
.det-close{position:sticky;top:0;float:right;background:var(--card);border:1px solid var(--bd);border-radius:6px;color:var(--t2);font-size:16px;line-height:1;padding:4px 8px;cursor:pointer;margin-bottom:12px}

/* Deadline urgency */
.urgent{border-left:3px solid var(--red)!important}
.warning{border-left:3px solid var(--amber)!important}

@media(max-width:900px){body{flex-direction:column;height:auto;overflow:auto}.sb{display:none}.main{padding:12px}}

<style>
.pin-key{width:72px;height:72px;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:rgba(15,20,36,.9);color:#EDF0F7;font-family:'Outfit',sans-serif;font-size:22px;font-weight:600;cursor:pointer;transition:all .12s;display:flex;align-items:center;justify-content:center}

<script>
const PIN_CORRECT='8888';
let pinEntry='';
function pinUpdateDots(){document.querySelectorAll('.pin-dot').forEach((d,i)=>{const f=i<pinEntry.length;d.style.background=f?'#34D399':'transparent';d.style.borderColor=f?'#34D399':'#2A3448';d.style.boxShadow=f?'0 0 6px rgba(52,211,153,.5)':'none'});}
function pinPress(d){if(pinEntry.length>=4)return;pinEntry+=d;pinUpdateDots();if(pinEntry.length===4)pinCheck();}
function pinBack(){pinEntry=pinEntry.slice(0,-1);pinUpdateDots();document.getElementById('pin-error').style.opacity='0';}
function pinClear(){pinEntry='';pinUpdateDots();document.getElementById('pin-error').style.opacity='0';}
function pinCheck(){
  if(pinEntry===PIN_CORRECT){
    sessionStorage.setItem('gp_auth','1');
    const s=document.getElementById('pin-screen');
    s.style.transition='opacity .4s ease';s.style.opacity='0';
    setTimeout(()=>{s.style.display='none';},400);
    loadData();setInterval(()=>loadData(),300000);
  } else {
    const err=document.getElementById('pin-error');
    err.textContent='Incorrect code — try again';err.style.opacity='1';
    const pad=document.getElementById('pin-dots');pad.style.transition='transform .07s';
    let sh=0;const shake=setInterval(()=>{pad.style.transform=sh%2===0?'translateX(8px)':'translateX(-8px)';if(++sh>5){clearInterval(shake);pad.style.transform='translateX(0)';}},70);
    setTimeout(()=>{pinEntry='';pinUpdateDots();},600);
  }
}
document.addEventListener('keydown',e=>{
  if(document.getElementById('pin-screen').style.display==='none')return;
  if(e.key>='0'&&e.key<='9')pinPress(e.key);
  else if(e.key==='Backspace')pinBack();
  else if(e.key==='Escape')pinClear();
});
if(sessionStorage.getItem('gp_auth')==='1'){document.getElementById('pin-screen').style.display='none';}
</script>

function sc(s){return s>=80?'var(--green)':s>=65?'var(--gold)':s>=50?'var(--amber)':'var(--red)';}
function fmt(v){if(!v&&v!==0)return '—';return v>=1e9?'$'+(v/1e9).toFixed(2)+'B':v>=1e6?'$'+(v/1e6).toFixed(1)+'M':v>=1000?'$'+(v/1000).toFixed(0)+'K':'$'+Math.round(v);}

// ── DEADLINE TRACKER ──────────────────────────────────────────────────────
function renderDeadlines(){
  const el=document.getElementById('t-deadlines');
  const active=GRANTS.filter(g=>g.deadline&&g.status!=='closed'&&g.status!=='won').sort((a,b)=>new Date(a.deadline)-new Date(b.deadline));
  const groups={7:[],14:[],30:[],60:[],later:[]};
  active.forEach(g=>{const d=daysLeft(g.deadline);if(d<=0)return;if(d<=7)groups[7].push(g);else if(d<=14)groups[14].push(g);else if(d<=30)groups[30].push(g);else if(d<=60)groups[60].push(g);else groups.later.push(g);});
  const section=(title,color,list)=>list.length?`<div style="margin-bottom:18px"><div style="font-size:11px;font-weight:700;color:${color};text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px">${title} (${list.length})</div>${list.map(g=>`<div class="grant-row ${urgencyClass(g.deadline)}" onclick="openGrantDetail('${g.grant_id}')"><div><div style="font-size:12px;font-weight:600">${(g.title||'Untitled').slice(0,56)}…</div><div style="font-size:10px;color:var(--t3);margin-top:2px">${g.funder||'—'}</div></div><div style="font-size:16px;font-weight:800;color:${sc(g.score||0)}">${g.score||'—'}</div><div style="font-size:12px">${fmt(g.amount_max)}</div><div style="font-size:11px;font-weight:600;color:${color}">${fmtDate(g.deadline)}</div><div style="font-size:13px;font-weight:800;color:${color}">${daysLeft(g.deadline)}d</div></div>`).join('')}</div>`:'';
  el.innerHTML=`<div style="margin-bottom:18px"><div style="font-size:20px;font-weight:800">⏰ Deadline Tracker</div><div style="font-size:11px;color:var(--t3);margin-top:2px">${active.length} active grants with upcoming deadlines</div></div>${section('🔴 Closing in ≤7 days','var(--red)',groups[7])}${section('🟡 Closing in 8–14 days','var(--amber)',groups[14])}${section('🟢 Closing in 15–30 days','var(--green)',groups[30])}${section('⬜ Closing in 31–60 days','var(--t2)',groups[60])}${section('📅 Closing later','var(--t3)',groups.later)}${!active.length?'<div class="empty"><div class="empty-icon">⏰</div><div class="empty-title">No active deadlines</div><div class="empty-body">Run discovery to populate grants with deadlines.</div></div>':''}`;
}

    {q:'What does the AI score mean?',a:'80–100: Strong match — apply now. 65–79: Good fit — worth reviewing. 50–64: Partial overlap. <50: Poor fit for Noble Erne\'s SAP/EdTech profile.'},
    {q:'How much does this cost?',a:'~$5–8/mo. Supabase free, GitHub Actions free, Claude Haiku ~$2/mo, Claude Sonnet ~$3/mo (manual only), SendGrid free.'},
    {q:'How do I add more grant sources?',a:'Add a fetch function in lib/sources/ following the federal.js pattern, then import it in grant-discovery-agent.js.'},
  ];
  el.innerHTML=`<div style="margin-bottom:18px"><div style="font-size:20px;font-weight:800">❓ Help & FAQ</div><div style="font-size:11px;color:var(--t3);margin-top:2px">GRANT PRIME quick reference</div></div>${faqs.map(f=>`<div class="card-section" style="cursor:pointer;margin-bottom:8px" onclick="const a=this.querySelector('.ans');a.style.display=a.style.display==='block'?'none':'block'"><div style="font-size:12px;font-weight:600;display:flex;justify-content:space-between;align-items:center">${f.q}<span style="color:var(--t3);font-size:16px">+</span></div><div class="ans" style="display:none;font-size:11px;color:var(--t2);line-height:1.7;margin-top:8px;padding-top:8px;border-top:1px solid var(--bd)">${f.a}</div></div>`).join('')}`;
}

// ── GRANT DETAIL PANEL ────────────────────────────────────────────────────
function openGrantDetail(grantId){
  const g=GRANTS.find(gr=>gr.grant_id===grantId||gr.id===grantId);
  if(!g)return;
  const d=daysLeft(g.deadline);
  openDetail(`
    <div style="margin-bottom:4px">
      <div style="font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px">${srcLabel(g.source)} Grant</div>
      <div style="font-size:18px;font-weight:800;line-height:1.3;margin-bottom:8px">${g.title||'Untitled'}</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">${statusPill(g.status||'new')}<span style="font-size:8px;font-weight:700;padding:1px 6px;border-radius:3px;background:rgba(255,255,255,.05);color:var(--t2)">${srcLabel(g.source).toUpperCase()}</span>${d!==null?`<span style="font-size:8px;font-weight:700;padding:1px 6px;border-radius:3px;background:${d<=7?'var(--redDim)':d<=14?'var(--amberDim)':'var(--greenDim)'};color:${d<=7?'var(--red)':d<=14?'var(--amber)':'var(--green)'}">${d} DAYS LEFT</span>`:''}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
        <div style="background:var(--card);border-radius:6px;padding:10px"><div style="font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px">AI Score</div><div style="font-size:28px;font-weight:900;color:${sc(g.score||0)}">${g.score||'—'}</div></div>
        <div style="background:var(--card);border-radius:6px;padding:10px"><div style="font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px">Award Amount</div><div style="font-size:16px;font-weight:800">${g.amount_min&&g.amount_max?fmt(g.amount_min)+' – '+fmt(g.amount_max):fmt(g.amount_max||g.amount_min)}</div></div>
      </div>
      ${g.notes?`<div style="background:var(--card);border-radius:6px;padding:10px;margin-bottom:12px"><div style="font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px">AI Reasoning</div><div style="font-size:11px;color:var(--t2);line-height:1.6">${g.notes}</div></div>`:''}
    </div>
    <div class="det-section"><div class="det-sec-label">Details</div>${[['Funder',g.funder],['Deadline',fmtDate(g.deadline)],['Source',srcLabel(g.source)],['Apply',g.apply_url?`<a href="${g.apply_url}" target="_blank" style="color:var(--green)">Open Application →</a>`:'—']].map(([l,v])=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--bd);font-size:11px"><span style="color:var(--t3)">${l}</span><span style="color:var(--t1);text-align:right;max-width:60%">${v||'—'}</span></div>`).join('')}</div>
    ${g.description?`<div class="det-section"><div class="det-sec-label">Description</div><div style="font-size:11px;color:var(--t2);line-height:1.7">${g.description.slice(0,600)}${g.description.length>600?'…':''}</div></div>`:''}
    ${g.eligibility?`<div class="det-section"><div class="det-sec-label">Eligibility</div><div style="font-size:11px;color:var(--t2);line-height:1.7">${g.eligibility}</div></div>`:''}
    ${g.proposal_draft?`<div class="det-section"><div class="det-sec-label">✍️ Proposal Draft</div><div style="font-size:11px;color:var(--t2);line-height:1.7;background:var(--card);padding:12px;border-radius:6px;white-space:pre-wrap">${g.proposal_draft.slice(0,800)}…</div></div>`:''}
    <div class="det-section">${g.apply_url?`<a href="${g.apply_url}" target="_blank" class="apply-btn" style="display:block;text-align:center;text-decoration:none;margin-bottom:10px">🚀 Open Application →</a>`:''}<div style="font-size:9px;color:var(--t3);text-align:center">Propose: node agents/grant-proposal-agent.js ${g.id||g.grant_id}</div></div>`);
}

// ── LOAD DATA ─────────────────────────────────────────────────────────────
async function loadData(){
  if(loading)return;loading=true;
  try{
    const {data,error}=await sb.from('grants').select('*').order('score',{ascending:false}).limit(500);
    if(error)throw error;
    GRANTS=data||[];
    document.getElementById('last-load').textContent='Updated '+new Date().toLocaleTimeString();
    const urgent=GRANTS.filter(g=>{const d=daysLeft(g.deadline);return d!==null&&d<=14&&g.score>=65&&g.status!=='closed'&&g.status!=='won'&&g.status!=='applied';}).length;
    const btn=document.getElementById('sb-action');
    if(btn)btn.innerHTML=`🚨 Action Queue${urgent?` <span style="margin-left:auto;background:var(--red);color:#fff;font-size:8px;font-weight:800;padding:1px 5px;border-radius:3px">${urgent}</span>`:''}`;
    const activeTab=document.querySelector('.tab.active');
    if(activeTab)render(activeTab.id.replace('t-',''));
  }catch(err){
    console.error('Load error:',err);
    document.getElementById('last-load').textContent='Load failed — check Supabase URL';
  }finally{loading=false;}
}

// ── BOOT ──────────────────────────────────────────────────────────────────
renderHome();
if(sessionStorage.getItem('gp_auth')==='1'){loadData();setInterval(()=>loadData(),300000);}
</script>
